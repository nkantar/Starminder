services:
  starminder-web:
    build: .
    container_name: starminder-web
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DJANGO_ADMIN_PREFIX=${DJANGO_ADMIN_PREFIX}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SITE_DISPLAY_NAME=${DJANGO_SITE_DISPLAY_NAME}
      - DJANGO_SITE_DOMAIN_NAME=${DJANGO_SITE_DOMAIN_NAME}
      - FORWARDEMAIL_TOKEN=${FORWARDEMAIL_TOKEN}
      - SENTRY_DSN=${SENTRY_DSN}
    expose:
      - "8000"
    networks:
      - starminder
      - coolify
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--output", "/dev/null", "--header", "Host: starminder.dev", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  starminder-worker:
    build: .
    container_name: starminder-web
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DJANGO_ADMIN_PREFIX=${DJANGO_ADMIN_PREFIX}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SITE_DISPLAY_NAME=${DJANGO_SITE_DISPLAY_NAME}
      - DJANGO_SITE_DOMAIN_NAME=${DJANGO_SITE_DOMAIN_NAME}
      - SENTRY_DSN=${SENTRY_DSN}
    networks:
      - starminder
    depends_on:
      - starminder-web
    command: ["just", "worker"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "qcluster"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  starminder:
    driver: bridge
  coolify:
    external: true
